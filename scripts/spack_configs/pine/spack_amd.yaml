# This is a Spack Environment file for Pine/Turin (Spack 1.0.2)
# Using AOCC 5.1.0 + AOCL on AMD
# Run command from the top-level of the repository:
# ./scripts/uberenv/uberenv.py                                  \
#    --spec "~openmp~pygeosx~docs %aocc-5"                              \
#    --spack-env-file=scripts/spack_configs/pine/spack_amd.yaml     \
#    --project-json=.uberenv_config.json                        \
#    --prefix ${GEOS_TPL_DIR}
# After TPL build, for GEOS - module load aocc, aocl, and openmpi-aocc on pine nodes

spack:
  config:
    install_tree:
      root: $spack/..
      projections:
        all: '{compiler.name}-{compiler.version}/{name}-{version}-{hash}'
    misc_cache: $spack/../misc_cache
    test_stage: $spack/../test_stage
    build_stage:
      - $spack/../build_stage
    build_jobs: 16
  view: false
  include:
  - ../defaults.yaml
  - ../versions.yaml
  toolchains:
    aocc-5:
    - spec: '%c=aocc@5.1.0'
      when: '%c'
    - spec: '%cxx=aocc@5.1.0'
      when: '%cxx'
    - spec: '%fortran=aocc@5.1.0'
      when: '%fortran'
    - spec: '%openmpi@5.0.5'
      when: '%mpi'

  packages:
    all:
      target: [zen4]
      providers:
        blas: [amdblis]
        lapack: [amdlibflame]
        mpi: [openmpi]
        zlib-api: [zlib]
        pkgconfig: [pkgconf]
    amdblis:
      externals:
      - spec: amdblis@5.1.0
        prefix: /hrtc/apps/devtools/AMD/aocl/5.1.0/aocc_5.0
      buildable: false
    amdlibflame:
      externals:
      - spec: amdlibflame@5.1.0
        prefix: /hrtc/apps/devtools/AMD/aocl/5.1.0/aocc_5.0
      buildable: false
    # Disable unwanted compilers
    nvhpc:
      buildable: false
    intel:
      buildable: false
    oneapi:
      buildable: false
    cce:
      buildable: false
    llvm-amdgpu:
      buildable: false
    berkeley-db:
      externals:
      - spec: berkeley-db@18.1.40
        prefix: /hrtc/apps/devtools/spack/PINE/linux-rocky9-zen4/gcc-11.4.1/berkeley-db-18.1.40-nixwddyxlb523z3aly4b7bje4rfft3me
      buildable: false
    bison:
      externals:
      - spec: bison@3.7.4
        prefix: /usr
      buildable: false
    cmake:
      externals:
      - spec: cmake@3.29.6
        prefix: /hrtc/apps/devtools/spack/PINE/linux-rocky9-zen4/gcc-11.4.1/cmake-3.29.6-i23jd7kq7lyqvrpsguhznfhoy4mso6up
      buildable: false
    curl:
      externals:
      - spec: curl@7.76.1
        prefix: /usr
      buildable: false
    flex:
      externals:
      - spec: flex@2.6.4+lex
        prefix: /usr
      buildable: false
    aocc:
      externals:
      - spec: aocc@=5.1.0
        prefix: /hrtc/apps/devtools/AMD/aocc/5.1.0
        extra_attributes:
          compilers:
            c: /hrtc/apps/devtools/AMD/aocc/5.1.0/bin/clang
            cxx: /hrtc/apps/devtools/AMD/aocc/5.1.0/bin/clang++
            fortran: /hrtc/apps/devtools/AMD/aocc/5.1.0/bin/flang
          flags:
            cflags: -march=native -mtune=native
            cxxflags: -march=native -mtune=native 
          environment: {}
          extra_rpaths: []
      buildable: false
    git:
      externals:
      - spec: git@2.39.3~tcltk
        prefix: /usr
      buildable: false
    gmake:
      externals:
      - spec: gmake@4.3
        prefix: /usr
      buildable: false
    gmp:
      externals:
      - spec: gmp@6.3.0
        prefix: /hrtc/apps/devtools/spack/PINE/linux-rocky9-zen4/gcc-11.4.1/gmp-6.3.0-q4glkxa77fd4rejkrrsuydut2c222fkm
      buildable: false
    libiconv:
      externals:
      - spec: libiconv@1.17
        prefix: /hrtc/apps/devtools/spack/PINE/linux-rocky9-zen4/gcc-11.4.1/libiconv-1.17-crgtppb7hj54qwkl3hfc6ejyu34gsa4d
      buildable: false
    m4:
      externals:
      - spec: m4@1.4.19
        prefix: /usr
      buildable: false
    mpfr:
      externals:
      - spec: mpfr@4.2.0
        prefix: /hrtc/apps/devtools/spack/PINE/linux-rocky9-zen4/gcc-11.4.1/mpfr-4.2.1-eaxjflobjpilpwfe4aalusexhcxhptrf
      buildable: false
    openmpi:
      externals:
      - spec: openmpi@5.0.5~cuda~java~memchecker~rocm+static~wrapper-rpath fabrics=ucx schedulers=none
        prefix: /hrtc/apps/mpi/openmpi/x86_64/rocky9/5.0.5/aocc/5.1.0/nocuda
      buildable: false
    openssh:
      externals:
      - spec: openssh@8.7p1
        prefix: /usr
      buildable: false
    perl:
      externals:
      - spec: perl@5.38.2
        prefix: /hrtc/apps/devtools/spack/PINE/linux-rocky9-zen4/gcc-11.4.1/perl-5.38.2-wxq42supt6zs3f63ajjtp6423q6teyot
      buildable: false
    pkgconf:
      externals:
      - spec: pkgconf@1.7.3
        prefix: /usr
      buildable: false
    python:
      externals:
      - spec: python@3.9.18
        prefix: /usr
      buildable: false
    sqlite:
      externals:
      - spec: sqlite@3.34.1+fts~functions+rtree
        prefix: /usr
      buildable: false
    xz:
      externals:
      - spec: xz@5.2.5
        prefix: /usr
      buildable: false
    zlib:
      externals:
      - spec: zlib@1.2.11
        prefix: /usr
      buildable: false
  concretizer:
    unify: true
    reuse: false

